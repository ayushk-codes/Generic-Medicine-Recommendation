<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Generic Medicine Finder</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* --- Theme Variables --- */
        :root {
            --primary-color: #14b8a6; /* Teal - A trustworthy medical color */
            --primary-hover: #0d9488;
            --dark-color: #334155;      
            --light-color: #f1f5f9;
            --text-color: #475569;
            --border-color: #e2e8f0;
            --bg-color: #f8fafc;
            --white: #ffffff;
            --error-bg: #fff1f2;
            --error-text: #e53e3e;
            --error-border: #fecaca;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns to top for better scrolling on mobile */
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
        }
        
        /* Header */
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header i { font-size: 3rem; color: var(--primary-color); margin-bottom: 0.5rem; }
        .header h1 { color: var(--dark-color); font-weight: 700; font-size: 2rem; }
        .header p { margin-top: 0.5rem; font-size: 1rem; color: var(--text-color); }

        /* Search Form */
        #search-form { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
        
        #brand-name-input {
            flex-grow: 1;
            font-size: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            color: var(--dark-color);
        }
        #brand-name-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
            border-color: var(--primary-color);
        }
        
        #search-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border: none;
            background-color: var(--primary-color);
            color: var(--white);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }
        #search-button:hover { background-color: var(--primary-hover); }
        #search-button i { font-size: 1.2rem; }

        /* Results Area */
        #results-container {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #results-container.visible { opacity: 1; transform: translateY(0); }

        /* Loader Animation */
        .loader { display: flex; justify-content: center; padding: 2rem; }
        .dot {
            height: 12px; width: 12px; margin: 0 4px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot.one { animation-delay: -0.32s; }
        .dot.two { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Message Box */
        .message {
            display: flex; align-items: flex-start; gap: 1rem;
            text-align: left; padding: 1.25rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--light-color);
            white-space: pre-wrap; /* Preserves newlines from backend messages */
        }
        .message i { font-size: 1.5rem; margin-top: 2px; color: var(--dark-color); flex-shrink: 0; }
        
        .message.error {
            background-color: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }
        .message.error i { color: var(--error-text); }

        /* Results Table */
        .results-header { margin-bottom: 1.5rem; }
        .results-header h2 { font-size: 1.5rem; color: var(--dark-color); margin-bottom: 0.25rem; }
        .results-header strong { color: var(--primary-color); font-weight: 600; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th {
            background-color: var(--light-color);
            font-weight: 600; color: var(--dark-color);
            font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        td:first-child { font-weight: 500; color: var(--dark-color); }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            body { padding: 1rem 0.5rem; }
            .container { padding: 1.5rem; }
            .header h1 { font-size: 1.5rem; }
            #search-form { flex-direction: column; }
            #search-button { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <i class='bx bxs-capsule'></i>
            <h1>Generic Medicine Finder</h1>
            <p>Enter a brand-name drug to find its generic alternatives.</p>
        </header>

        <main>
            <form id="search-form">
                <input type="text" id="brand-name-input" placeholder="e.g., Tylenol, Advil, Lipitor..." required aria-label="Brand Name">
                <button type="submit" id="search-button">
                    <i class='bx bx-search'></i>
                    <span>Search</span>
                </button>
            </form>

            <div id="results-container" aria-live="polite"></div>
        </main>
    </div>

    <script>
        const form = document.getElementById('search-form');
        const input = document.getElementById('brand-name-input');
        const resultsContainer = document.getElementById('results-container');

        // Auto-focus input on load so user can type immediately
        window.onload = () => input.focus();

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const brandName = input.value.trim();
            
            if (!brandName) {
                input.focus();
                return;
            }

            showLoader();

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brand_name: brandName }),
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    displayResults(result.data, result.ingredient);
                } else if (result.status === 'not_found') {
                    displayMessage(`Active Ingredient: ${result.ingredient}\n\n${result.message}`, 'info');
                } else { 
                    displayMessage(result.message, 'error');
                }

            } catch (error) {
                console.error('Error:', error);
                displayMessage('Network error. Please try again later.', 'error');
            }
            
            // Trigger the fade-in animation
            requestAnimationFrame(() => {
                resultsContainer.classList.add('visible');
            });
        });

        function showLoader() {
            resultsContainer.classList.remove('visible');
            resultsContainer.innerHTML = `
                <div class="loader">
                    <div class="dot one"></div><div class="dot two"></div><div class="dot three"></div>
                </div>
            `;
            // Small delay to allow browser to register the class removal
            setTimeout(() => resultsContainer.classList.add('visible'), 10);
        }

        // --- SAFE DOM MANIPULATION (PREVENTS XSS ATTACKS) ---
        function displayResults(data, ingredient) {
            resultsContainer.innerHTML = ''; 

            // Header Construction
            const headerDiv = document.createElement('div');
            headerDiv.className = 'results-header';
            
            const title = document.createElement('h2');
            title.textContent = 'Generic Alternatives Found';
            
            const p = document.createElement('p');
            p.textContent = 'Showing products that contain ';
            const strong = document.createElement('strong');
            strong.textContent = ingredient;
            p.appendChild(strong);
            
            headerDiv.append(title, p);
            resultsContainer.appendChild(headerDiv);

            // Table Construction
            const table = document.createElement('table');
            table.innerHTML = `<thead><tr><th>Product Name</th><th>Manufacturer</th></tr></thead>`;
            
            const tbody = document.createElement('tbody');
            
            if (data.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan="2" style="text-align:center;">No other generic products found.</td>`;
                tbody.appendChild(row);
            } else {
                data.forEach(item => {
                    const row = document.createElement('tr');
                    
                    const nameCell = document.createElement('td');
                    nameCell.textContent = item.product_name;
                    
                    const manufCell = document.createElement('td');
                    manufCell.textContent = item.manufacturer;
                    
                    row.append(nameCell, manufCell);
                    tbody.appendChild(row);
                });
            }
            
            table.appendChild(tbody);
            resultsContainer.appendChild(table);
        }

        function displayMessage(text, type) {
            resultsContainer.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = type === 'error' ? 'message error' : 'message';
            
            const icon = document.createElement('i');
            icon.className = type === 'error' ? 'bx bxs-error-circle' : 'bx bxs-info-circle';
            
            const p = document.createElement('p');
            p.textContent = text;
            
            div.append(icon, p);
            resultsContainer.appendChild(div);
        }
    </script>
</body>
</html>
