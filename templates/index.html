<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generic Medicine Finder (Offline)</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --primary: #14b8a6; --dark: #334155; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 2rem; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 800px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--dark); text-align: center; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { opacity: 0.9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f1f5f9; text-align: left; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 15px; background: #f1f5f9; border-radius: 8px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class='bx bxs-capsule' style="font-size: 40px; color: var(--primary);"></i>
            <h1>Generic Medicine Finder</h1>
            <p style="color: #666;">Offline Mode • Python Flask Backend</p>
        </div>

        <form id="search-form" class="search-box">
            <input type="text" id="brand-input" placeholder="e.g., Ibuprofen, Amoxicillin, Gabapentin..." required>
            <button type="submit">Search</button>
        </form>

        <div id="results"></div>
    </div>

    <script>
        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const brand = document.getElementById('brand-input').value;
            const container = document.getElementById('results');

            container.innerHTML = '<div class="msg">Searching internal database...</div>';

            try {
                // This fetches from the local Python Backend
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brand_name: brand })
                });

                // If the backend 404s, this line will throw an error
                if (!response.ok) throw new Error("Backend not found");

                const res = await response.json();

                if (res.status === 'success') {
                    let html = `
                        <div style="margin-top: 20px;">
                            <h3>Found ${res.data.length} alternatives for <strong>${brand}</strong></h3>
                            <p>Active Ingredient: <em>${res.ingredient}</em></p>
                            <table>
                                <tr><th>Product Name</th><th>Manufacturer</th></tr>
                                ${res.data.map(item => `<tr><td>${item.product_name}</td><td>${item.manufacturer}</td></tr>`).join('')}
                            </table>
                        </div>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div class="msg" style="color: red;">No data found for <strong>${brand}</strong> in the offline database.</div>`;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="msg" style="color: red;">Server Error. Is Flask running with the correct code?</div>';
            }
        });
    </script>
</body>
</html>
